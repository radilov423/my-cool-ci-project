name: Node.js CI with Docker

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Обновили до Node 24 (как просил GitHub в предупреждении)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx vitest run

      # НОВЫЙ ЭТАП: Проверяем сборку Docker-образа
      - name: Build Docker Image
        run: |
          docker build -t my-app:${{ github.sha }} .
          echo "Docker image built successfully!"
      # 5. Логинимся в реестр GitHub (используем встроенный секретный токен)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Собираем и сразу ПУБЛИКУЕМ образ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Название образа будет: ghcr.io/твой-логин/my-cool-ci-project:latest
          tags: ghcr.io/${{ github.repository_owner }}/my-cool-ci-project:latest
