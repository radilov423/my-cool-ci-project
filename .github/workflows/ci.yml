name: Advanced CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Позволяем GitHub останавливать старые запуски, если ты сделал новый пуш (экономит ресурсы)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ПЕРВАЯ ЗАДАЧА: Проверка кода
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Включаем автоматическое кэширование библиотек

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

  # ВТОРАЯ ЗАДАЧА: Сборка и Публикация Docker
  build-and-push:
    # ОЧЕНЬ ВАЖНО: эта задача запустится ТОЛЬКО если первая (check-quality) прошла успешно
    needs: check-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-cool-ci-project:latest
            ghcr.io/${{ github.repository_owner }}/my-cool-ci-project:${{ github.sha }}